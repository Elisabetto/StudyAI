<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/documents.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <nav>
            <h1>
                <a href="dashboard.html">StudyAI</a>
            </h1>
            <div class="nav-menu">
                <ul>
                    <li><a href="dashboard.html">Inicio</a></li>
                    <li><a href="documents.html">Documentos</a></li>
                    <li><a href="calendar.html">Calendario</a></li>
                    <li><a href="profile.html">Perfil</a></li>
                </ul>
                <a href="index.html" class="cerrar-sesion">Cerrar sesión</a>
            </div>
        </nav>
        
        <section class="contenido">
            <h2>Mis documentos</h2>

            <div class="acciones-documentos">
                <div class="buscador">
                    <input type="search" id="buscar-documento" name="buscar-documento" placeholder="Buscar documento...">
                </div>
                <button type="button" class="subir-documento">Subir documento</button>
            </div>

            <div class="lista-documentos">

            </div>
        </section>
 
    </main>
    <div class="modal" id="modal-subir">
            <div class="modal-contenido">
                <h2>Subir documento</h2>
                <form id="form-subir-documento">
                    <div class="input-grupo">
                        <label for="titulo-documento">Título</label>
                        <input type="text" id="titulo-documento" placeholder="Ej. Matemáticas" required>
                    </div>
                    <div class="input-grupo">
                        <label for="archivo">Selecciona un PDF</label>
                        <input type="file" id="archivo" accept=".pdf" required>
                    </div>
                    <div class="modal-botones">
                        <button type="button" id="cancelar-subida">Cancelar</button>
                        <button type="submit">Guardar</button>
                    </div>
                </form>
            </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script> 
<script src="js/auth.guard.js"></script>
<script src="js/auth.js"></script>
<script src="js/documents.js"></script>  
</body>
</html>
