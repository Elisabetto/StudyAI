<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.17/locales/es.global.min.js"></script>
</head>
<body>
    <main>
        <nav>
            <h1>
                <a href="dashboard.html">StudyAI</a>
            </h1>
            <div class="nav-menu">
                <ul>
                    <li><a href="dashboard.html">Inicio</a></li>
                    <li><a href="documents.html">Documentos</a></li>
                    <li><a href="calendar.html">Calendario</a></li>
                    <li><a href="profile.html">Perfil</a></li>
                </ul>
                <a href="index.html" class="cerrar-sesion">Cerrar sesión</a>
            </div>
        </nav>
        <section class="contenido">
            <h2>Calendario</h2>
            
            <div class="calendario">
                <div id="calendario"></div>
                <h3>Próximos eventos</h3>
                <div id="proximos-eventos">
                    <p>No hay eventos próximos</p>
                </div>
            </div>
            <div class="eventos">
                <h3>Eventos</h3>
                <button class="crear-evento">Crear evento</button>
                <div class="modal" id="modal-evento">
                <div class="modal-contenido">
                    <h2>Nuevo evento</h2>
                    <form id="form-evento">
                        <div class="input-grupo">
                            <label>Título</label>
                            <input type="text" id="titulo-evento" required>
                        </div>
                        <div class="input-grupo">
                            <label>Descripción</label>
                            <textarea id="descripcion-evento"></textarea>
                        </div>
                        <div class="input-grupo">
                            <label>Tipo</label>

                            <select id="tipo-evento">
                                <option value="estudio">Estudio</option>
                                <option value="examen">Examen</option>
                                <option value="entrega">Entrega</option>
                                <option value="proyecto">Proyecto</option>
                            </select>
                        </div>
                        <div class="input-grupo">
                            <label>Fecha</label>
                            <input type="date" id="fecha-evento" required>
                        </div>
                        <div class="input-grupo">
                            <label>Hora</label>
                            <input type="time" id="hora-evento">
                        </div>
                        <div class="modal-botones">
                            <button type="button" id="cancelar-evento">Cancelar</button>
                            <button type="submit">Guardar</button>
                        </div>
                    </form>
                </div>
                </div>
                <div class="lista-evento">
                    <p>No tienes eventos todavía.</p>
                </div>
            </div>
        </section>
    </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>   
<script src="js/auth.guard.js"></script>
<script src="js/auth.js"></script>    
<script src="js/calendar.js"></script> 
</body>
</html>
