<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div class="auth-contenedor">
            <h1>
                <a href="index.html">StudyAI</a>
            </h1>
            <h2>Crear una cuenta</h2>
            <p>
                Crea tu cuenta para comenzar a estudiar con inteligencia artificial.
            </p>
            <form class="auth-formulario">
                <div class="input-grupo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Introduce tu nombre" required>
                </div>
                <div class="input-grupo">
                    <label for="correo">Email</label>
                    <input type="email" id="correo" name="correo" placeholder="Introduce tu correo" required>
                </div>
                <div class="input-grupo">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Introduce tu contraseña" required>
                </div>
                <div class="input-grupo">
                    <label for="confirmar-contrasena">Confirma tu contraseña</label>
                    <input type="password" id="confirmar-contrasena" name="confirmar-contrasena" placeholder="Confirma tu contraseña" required>
                </div>
                <button type="submit">Crear cuenta</button>
            </form>
            <div class="auth-enlace">
                <p>
                    ¿Ya tienes una cuenta? 
                    <a href="login.html">Inicia sesión</a>
                </p>
            </div>
        </div>
          
    </main>
    <footer>
            <p>&copy; 2026 StudyAI. Todos los derechos reservados.</p>
    </footer> 
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
